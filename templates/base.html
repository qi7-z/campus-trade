<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}校园二手物品交易系统{% endblock %}</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    {% if session.get('user_id') %}
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('user_dashboard') if session.get('role')=='user' else url_for('admin_dashboard') }}">
                🏪 校园二手交易
            </a>
            <div class="ms-auto d-flex align-items-center gap-3">
                <span class="text-white-50">👤 {{ session.get('username') }}</span>
                <button class="btn btn-outline-light btn-sm" onclick="logout()">退出登录</button>
            </div>
        </div>
    </nav>
    {% endif %}
    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
    <script>
        async function api(url, data) {
            const res = await fetch(url, {
                method: data ? 'POST' : 'GET',
                headers: data ? {'Content-Type': 'application/json'} : {},
                body: data ? JSON.stringify(data) : undefined
            });
            return res.json();
        }

        async function logout() {
            await api('/api/logout');
            window.location.href = '/';
        }

        function showToast(msg, type) {
            const container = document.getElementById('toast-container') || (() => {
                const div = document.createElement('div');
                div.id = 'toast-container';
                div.style.cssText = 'position:fixed;top:20px;right:20px;z-index:9999';
                document.body.appendChild(div);
                return div;
            })();
            const el = document.createElement('div');
            el.className = `alert alert-${type === 'error' ? 'danger' : 'success'} alert-dismissible fade show`;
            el.innerHTML = `${msg}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>`;
            container.appendChild(el);
            setTimeout(() => el.remove(), 3000);
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
