{% extends "base.html" %}
{% block title %}用户管理{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="fw-bold mb-0"><i class="fas fa-users text-primary me-2"></i>用户管理</h4>
    <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline-secondary rounded-pill btn-sm px-3">
        <i class="fas fa-arrow-left me-1"></i>返回
    </a>
</div>
<div class="card shadow-sm border-0" style="border-radius:16px;">
    <div class="card-body p-0">
        <div class="p-3 border-bottom bg-light bg-opacity-50">
            <span class="small text-muted"><i class="fas fa-database me-1"></i>共 <strong id="userCount">0</strong> 个用户</span>
        </div>
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th class="ps-4">ID</th>
                        <th>用户名</th>
                        <th>余额</th>
                        <th>注册时间</th>
                        <th>购买次数</th>
                        <th class="pe-4 text-center" style="width:180px">操作</th>
                    </tr>
                </thead>
                <tbody id="userTableBody">
                    <tr><td colspan="6" class="text-center text-muted py-4">加载中...</td></tr>
                </tbody>
            </table>
        </div>
        <nav id="paginationNav" class="d-none p-3 border-top">
            <ul class="pagination justify-content-center mb-0">
                <li class="page-item" id="prevPage"><a class="page-link" href="#"><i class="fas fa-chevron-left"></i></a></li>
                <li class="page-item disabled"><a class="page-link" id="pageInfo" href="#">1/1</a></li>
                <li class="page-item" id="nextPage"><a class="page-link" href="#"><i class="fas fa-chevron-right"></i></a></li>
            </ul>
        </nav>
    </div>
</div>

<!-- Recharge Modal -->
<div class="modal fade" id="rechargeModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content border-0 shadow" style="border-radius:20px;">
            <div class="modal-header border-0 pb-0 px-4 pt-4">
                <h5 class="modal-title fw-bold"><i class="fas fa-coins text-warning me-1"></i>充值</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body px-4 pb-4 pt-3">
                <div class="text-center mb-3">
                    <span class="text-muted small">为</span>
                    <strong id="rechargeUsername">用户</strong>
                    <span class="text-muted small">充值</span>
                </div>
                <div class="row g-2 mb-3" id="amountGrid">
                    <div class="col-4"><button type="button" class="btn btn-outline-primary w-100 amt-btn" data-val="30">¥30</button></div>
                    <div class="col-4"><button type="button" class="btn btn-outline-primary w-100 amt-btn" data-val="50">¥50</button></div>
                    <div class="col-4"><button type="button" class="btn btn-outline-primary w-100 amt-btn" data-val="100">¥100</button></div>
                    <div class="col-4"><button type="button" class="btn btn-outline-primary w-100 amt-btn" data-val="200">¥200</button></div>
                    <div class="col-4"><button type="button" class="btn btn-outline-primary w-100 amt-btn" data-val="300">¥300</button></div>
                    <div class="col-4"><button type="button" class="btn btn-outline-primary w-100 amt-btn" data-val="500">¥500</button></div>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-medium text-muted">自定义金额</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light">¥</span>
                        <input type="number" class="form-control" id="customAmount" min="1" step="0.01" placeholder="输入金额">
                    </div>
                </div>
                <div id="rechargeError" class="alert alert-danger d-none py-2 small"></div>
                <div id="rechargeSuccess" class="alert alert-success d-none py-2 small"></div>
                <button type="button" class="btn btn-warning w-100 rounded-pill py-2 fw-bold" id="rechargeConfirmBtn">
                    <i class="fas fa-check me-1"></i>确认充值
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Delete User Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content border-0 shadow" style="border-radius:20px;">
            <div class="modal-header border-0 pb-0 px-4 pt-4">
                <h5 class="modal-title fw-bold text-danger"><i class="fas fa-exclamation-triangle me-1"></i>删除用户</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body px-4 pb-4 pt-3">
                <p class="small text-muted">该用户的所有商品和购买记录也将被删除。</p>
                <form id="deleteForm" onsubmit="return doDeleteUser(event);">
                    <div class="mb-3">
                        <label class="form-label small fw-medium text-muted">二级密码</label>
                        <input type="password" class="form-control" id="deletePwd" required placeholder="accon">
                    </div>
                    <div id="deleteError" class="alert alert-danger d-none py-2 small"></div>
                    <button type="submit" class="btn btn-danger w-100 rounded-pill py-2">确认删除</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
    var userPage = 1;
    var rechargeUserId = null;
    var rechargeAmount = null;
    var delUserId = null;
    var delUsername = '';

    async function loadUsers(page) {
        var data = await api('/api/admin/users?page=' + page, null);
        var tbody = document.getElementById('userTableBody');
        var nav = document.getElementById('paginationNav');
        document.getElementById('userCount').textContent = data.total || 0;
        if (!data.ok || data.users.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-4">暂无用户</td></tr>';
            nav.classList.add('d-none');
            return;
        }
        tbody.innerHTML = data.users.map(function(user) {
            return '<tr>' +
                '<td class="ps-4 text-muted">' + user.id + '</td>' +
                '<td><strong>' + user.username + '</strong></td>' +
                '<td><span class="fw-bold text-primary">¥' + user.balance.toFixed(2) + '</span></td>' +
                '<td class="small text-muted">' + user.created_at + '</td>' +
                '<td>' + user.purchase_count + '</td>' +
                '<td class="pe-4 text-center">' +
                    '<button class="btn btn-warning btn-sm rounded-pill px-3" onclick="openRecharge(' + user.id + ',\'' + user.username + '\')" style="margin-right:4px;">' +
                        '<i class="fas fa-coins me-1"></i>充值' +
                    '</button>' +
                    '<button class="btn btn-outline-danger btn-sm rounded-pill px-3" onclick="openDelete(' + user.id + ',\'' + user.username + '\')">' +
                        '<i class="fas fa-trash-alt me-1"></i>删除' +
                    '</button>' +
                '</td>' +
            '</tr>';
        }).join('');
        document.getElementById('pageInfo').textContent = page + '/' + data.total_pages;
        document.getElementById('prevPage').classList.toggle('disabled', page <= 1);
        document.getElementById('nextPage').classList.toggle('disabled', page >= data.total_pages);
        nav.classList.remove('d-none');
    }
    document.getElementById('prevPage').addEventListener('click', function(e) { e.preventDefault(); if (userPage > 1) loadUsers(--userPage); });
    document.getElementById('nextPage').addEventListener('click', function(e) { e.preventDefault(); loadUsers(++userPage); });

    // ── Recharge ──
    function openRecharge(id, username) {
        rechargeUserId = id;
        rechargeAmount = null;
        document.getElementById('rechargeUsername').textContent = username;
        document.getElementById('customAmount').value = '';
        document.getElementById('rechargeError').classList.add('d-none');
        document.getElementById('rechargeSuccess').classList.add('d-none');
        document.querySelectorAll('.amt-btn').forEach(function(b) { b.classList.remove('active'); });
        new bootstrap.Modal(document.getElementById('rechargeModal')).show();
    }

    document.querySelectorAll('.amt-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.amt-btn').forEach(function(b) { b.classList.remove('active'); });
            this.classList.add('active');
            rechargeAmount = parseFloat(this.getAttribute('data-val'));
            document.getElementById('customAmount').value = '';
        });
    });

    document.getElementById('customAmount').addEventListener('input', function() {
        document.querySelectorAll('.amt-btn').forEach(function(b) { b.classList.remove('active'); });
        rechargeAmount = null;
    });

    document.getElementById('rechargeConfirmBtn').addEventListener('click', async function() {
        var errEl = document.getElementById('rechargeError');
        var sucEl = document.getElementById('rechargeSuccess');
        errEl.classList.add('d-none');
        sucEl.classList.add('d-none');

        var amount = rechargeAmount;
        if (!amount) {
            amount = parseFloat(document.getElementById('customAmount').value);
            if (!amount || amount <= 0) {
                errEl.textContent = '请选择或输入有效金额';
                errEl.classList.remove('d-none');
                return;
            }
        }
        var result = await api('/api/admin/user/recharge', {
            user_id: rechargeUserId,
            amount: amount
        });
        if (result.ok) {
            sucEl.textContent = '✅ ' + result.msg;
            sucEl.classList.remove('d-none');
            loadUsers(userPage);
            setTimeout(function() {
                bootstrap.Modal.getInstance(document.getElementById('rechargeModal')).hide();
            }, 1200);
        } else {
            errEl.textContent = '❌ ' + result.msg;
            errEl.classList.remove('d-none');
        }
    });

    // ── Delete ──
    function openDelete(id, username) {
        delUserId = id;
        delUsername = username;
        document.getElementById('deletePwd').value = '';
        document.getElementById('deleteError').classList.add('d-none');
        new bootstrap.Modal(document.getElementById('deleteModal')).show();
    }

    function doDeleteUser(e) {
        if (e) e.preventDefault();
        var pwd = document.getElementById('deletePwd').value.trim();
        var errEl = document.getElementById('deleteError');
        errEl.classList.add('d-none');
        api('/api/admin/user/delete', { user_id: delUserId, secondary_password: pwd }).then(function(result) {
            if (result.ok) {
                bootstrap.Modal.getInstance(document.getElementById('deleteModal')).hide();
                showToast('用户「' + delUsername + '」已删除', 'success');
                loadUsers(userPage);
            } else {
                errEl.textContent = result.msg;
                errEl.classList.remove('d-none');
            }
        });
        return false;
    }

    loadUsers(1);
</script>
<style>
.amt-btn { border-radius: 10px !important; font-weight: 600; padding: 10px 0 !important; transition: all .2s; }
.amt-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,.08); }
.amt-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); box-shadow: 0 2px 8px rgba(74,111,165,.3); }
</style>
{% endblock %}
