{% extends "base.html" %}
{% block title %}用户首页{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="text-center mb-4">
            <div class="welcome-avatar mb-3">
                <i class="fas fa-user-circle fa-4x text-primary"></i>
            </div>
            <h3 class="fw-bold">欢迎回来，{{ username }}！</h3>
            <div class="d-flex justify-content-center gap-4 mt-2">
                <div class="balance-card d-inline-flex align-items-center gap-2 px-4 py-2 rounded-pill">
                    <i class="fas fa-wallet text-primary"></i>
                    <span class="fw-bold">¥<span id="dashBalance">{{ "%.2f"|format(session.get('balance', 0)) }}</span></span>
                </div>
            </div>
        </div>
        <div class="row g-3">
            <div class="col-md-3 col-6">
                <a href="{{ url_for('user_release_page') }}" class="text-decoration-none">
                    <div class="card dashboard-card text-center p-3 h-100">
                        <div class="card-body">
                            <div class="dashboard-icon bg-primary bg-opacity-10 mb-3">
                                <i class="fas fa-upload fa-2x text-primary"></i>
                            </div>
                            <h6 class="fw-bold">发布商品</h6>
                            <small class="text-muted">上架您的闲置物品</small>
                        </div>
                    </div>
                </a>
            </div>
            <div class="col-md-3 col-6">
                <a href="{{ url_for('user_items_page') }}" class="text-decoration-none">
                    <div class="card dashboard-card text-center p-3 h-100">
                        <div class="card-body">
                            <div class="dashboard-icon bg-info bg-opacity-10 mb-3">
                                <i class="fas fa-list fa-2x text-info"></i>
                            </div>
                            <h6 class="fw-bold">商品列表</h6>
                            <small class="text-muted">浏览所有在售商品</small>
                        </div>
                    </div>
                </a>
            </div>
            <div class="col-md-3 col-6">
                <a href="{{ url_for('user_purchase_page') }}" class="text-decoration-none">
                    <div class="card dashboard-card text-center p-3 h-100">
                        <div class="card-body">
                            <div class="dashboard-icon bg-success bg-opacity-10 mb-3">
                                <i class="fas fa-search fa-2x text-success"></i>
                            </div>
                            <h6 class="fw-bold">搜索购买</h6>
                            <small class="text-muted">查找并购买心仪商品</small>
                        </div>
                    </div>
                </a>
            </div>
            <div class="col-md-3 col-6">
                <a href="{{ url_for('user_cart_page') }}" class="text-decoration-none">
                    <div class="card dashboard-card text-center p-3 h-100">
                        <div class="card-body">
                            <div class="dashboard-icon bg-warning bg-opacity-10 mb-3">
                                <i class="fas fa-shopping-cart fa-2x text-warning"></i>
                            </div>
                            <h6 class="fw-bold">购物车</h6>
                            <small class="text-muted">查看已购商品</small>
                        </div>
                    </div>
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>refreshBalance();</script>
<style>
.dashboard-card { transition: all .25s ease; cursor: pointer; border: 1px solid #eef2f7; border-radius: 16px; }
.dashboard-card:hover { transform: translateY(-5px); box-shadow: 0 12px 30px rgba(0,0,0,.08); border-color: transparent; }
.dashboard-icon { width: 56px; height: 56px; border-radius: 14px; display: inline-flex; align-items: center; justify-content: center; margin: 0 auto; }
.balance-card { background: linear-gradient(135deg, #e8f0fe, #f0f4ff); border: 1px solid #d0ddf5; }
.welcome-avatar i { font-size: 3.5rem; opacity: .8; }
</style>
{% endblock %}
