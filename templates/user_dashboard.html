{% extends "base.html" %}
{% block title %}用户首页{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="text-center mb-4">
            <h3>👋 欢迎，{{ username }}！</h3>
            <p class="text-muted">请选择您要进行的操作</p>
        </div>
        <div class="row g-3">
            <div class="col-md-3 col-6">
                <a href="{{ url_for('user_release_page') }}" class="text-decoration-none">
                    <div class="card dashboard-card text-center p-3 h-100">
                        <div class="card-body">
                            <div class="fs-1 mb-2">📤</div>
                            <h6>发布商品</h6>
                            <small class="text-muted">上架您的闲置物品</small>
                        </div>
                    </div>
                </a>
            </div>
            <div class="col-md-3 col-6">
                <a href="{{ url_for('user_items_page') }}" class="text-decoration-none">
                    <div class="card dashboard-card text-center p-3 h-100">
                        <div class="card-body">
                            <div class="fs-1 mb-2">📋</div>
                            <h6>商品列表</h6>
                            <small class="text-muted">浏览所有在售商品</small>
                        </div>
                    </div>
                </a>
            </div>
            <div class="col-md-3 col-6">
                <a href="{{ url_for('user_purchase_page') }}" class="text-decoration-none">
                    <div class="card dashboard-card text-center p-3 h-100">
                        <div class="card-body">
                            <div class="fs-1 mb-2">🔍</div>
                            <h6>搜索商品</h6>
                            <small class="text-muted">查找并购买心仪商品</small>
                        </div>
                    </div>
                </a>
            </div>
            <div class="col-md-3 col-6">
                <a href="{{ url_for('user_cart_page') }}" class="text-decoration-none">
                    <div class="card dashboard-card text-center p-3 h-100">
                        <div class="card-body">
                            <div class="fs-1 mb-2">🛒</div>
                            <h6>购物车</h6>
                            <small class="text-muted">查看已购商品</small>
                        </div>
                    </div>
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<style>
.dashboard-card { transition: transform .2s, box-shadow .2s; cursor: pointer; border: 1px solid #e0e0e0; }
.dashboard-card:hover { transform: translateY(-3px); box-shadow: 0 4px 15px rgba(0,0,0,.1); }
</style>
{% endblock %}
