{% extends "base.html" %}
{% block title %}搜索购买{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="fw-bold mb-0"><i class="fas fa-search text-success me-2"></i>搜索商品</h4>
    <a href="{{ url_for('user_dashboard') }}" class="btn btn-outline-secondary rounded-pill btn-sm px-3">
        <i class="fas fa-arrow-left me-1"></i>返回
    </a>
</div>

<div class="row g-3">
    <div class="col-lg-8">
        <div class="card shadow-sm border-0" style="border-radius:16px;">
            <div class="card-body p-4">
                <div class="input-group mb-3">
                    <span class="input-group-text bg-white border-end-0"><i class="fas fa-search text-muted"></i></span>
                    <input type="text" class="form-control border-start-0 ps-0" id="searchInput"
                           placeholder="输入商品名称搜索..." autocomplete="off">
                    <button class="btn btn-success px-4" onclick="searchItems()">
                        <i class="fas fa-search me-1"></i>搜索
                    </button>
                </div>
                <div id="searchResults" class="row g-2"></div>
                <div id="searchEmpty" class="text-center py-5 text-muted d-block">
                    <i class="fas fa-box-open fa-3x mb-3 d-block opacity-25"></i>
                    <span>输入商品名称开始搜索</span>
                </div>
            </div>
        </div>
    </div>
    <div class="col-lg-4">
        <div class="card shadow-sm border-0" style="border-radius:16px;">
            <div class="card-body p-4">
                <h6 class="fw-bold mb-3"><i class="fas fa-wallet me-2 text-primary"></i>我的钱包</h6>
                <div class="text-center py-3">
                    <div class="display-6 fw-bold text-primary mb-1">¥<span id="purchaseBalance">{{ "%.2f"|format(session.get('balance', 0)) }}</span></div>
                    <p class="text-muted small mb-0">当前可用余额</p>
                </div>
                <hr class="my-3">
                <p class="small text-muted mb-0">
                    <i class="fas fa-info-circle me-1"></i>
                    购买商品时将自动从余额扣款
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
    let searchTimer;
    refreshBalance();

    document.getElementById('searchInput').addEventListener('input', function() {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(searchItems, 300);
    });

    document.getElementById('searchInput').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') searchItems();
    });

    async function searchItems() {
        const keyword = document.getElementById('searchInput').value.trim();
        const container = document.getElementById('searchResults');
        const empty = document.getElementById('searchEmpty');

        if (!keyword) {
            container.innerHTML = '';
            empty.classList.remove('d-none');
            empty.classList.add('d-block');
            return;
        }

        empty.classList.add('d-none');
        container.innerHTML = '<div class="col-12 text-center py-4"><div class="spinner-border text-success"></div></div>';

        const data = await api(`/api/user/search?keyword=${encodeURIComponent(keyword)}`, null);

        if (!data.ok || data.items.length === 0) {
            container.innerHTML = '';
            empty.classList.remove('d-none');
            empty.innerHTML = '<i class="fas fa-box-open fa-3x mb-3 d-block opacity-25"></i><span>未找到相关商品</span>';
            return;
        }

        container.innerHTML = data.items.map(item => `
            <div class="col-md-6">
                <div class="card border h-100 item-card">
                    <div class="card-body p-3">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <h6 class="fw-bold mb-0 item-name">${item.name}</h6>
                        </div>
                        <div class="d-flex justify-content-between align-items-center mt-3">
                            <span class="price-tag fs-5 fw-bold text-danger">¥${item.price}</span>
                            <button class="btn btn-success btn-sm rounded-pill px-3" onclick="purchaseItem(${item.id}, '${item.name}')">
                                <i class="fas fa-shopping-cart me-1"></i>立即购买
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        `).join('');

        // Refresh balance after purchase operations
        const balData = await api('/api/user/balance');
        if (balData.ok) {
            document.getElementById('purchaseBalance').textContent = balData.balance.toFixed(2);
            if (document.getElementById('navBalance')) {
                document.getElementById('navBalance').textContent = '¥' + balData.balance.toFixed(2);
            }
            document.getElementById('dashBalance').textContent = balData.balance.toFixed(2);
        }
    }

    async function purchaseItem(itemId, itemName) {
        // Refresh balance first
        const balData = await api('/api/user/balance');
        if (!confirm(`确定要购买「${itemName}」吗？`)) return;

        const result = await api('/api/user/purchase', { item_id: itemId });
        if (result.ok) {
            showToast(`✅ 购买成功！「${itemName}」已添加到您的购物车`, 'success');
            searchItems();
        } else {
            showToast(`❌ ${result.msg}`, 'error');
        }
    }
</script>
<style>
.item-card { border-radius: 12px; transition: all .2s ease; }
.item-card:hover { box-shadow: 0 4px 12px rgba(0,0,0,.06); border-color: #c8e6c9 !important; }
.item-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.price-tag { font-family: 'Courier New', monospace; }
</style>
{% endblock %}
