{% extends "base.html" %}
{% block title %}搜索购买{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0">🔍 搜索商品</h4>
    <a href="{{ url_for('user_dashboard') }}" class="btn btn-outline-secondary btn-sm">← 返回</a>
</div>
<div class="card shadow-sm">
    <div class="card-body">
        <div class="input-group mb-3">
            <input type="text" class="form-control" id="searchInput" placeholder="输入商品名称搜索..."
                   autocomplete="off">
            <button class="btn btn-primary" onclick="searchItems()">搜索</button>
        </div>
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                    <tr>
                        <th>商品名称</th>
                        <th>价格（元）</th>
                        <th style="width:120px">操作</th>
                    </tr>
                </thead>
                <tbody id="searchResults">
                    <tr><td colspan="3" class="text-center text-muted">输入商品名称开始搜索</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
    let searchTimer;

    document.getElementById('searchInput').addEventListener('input', function() {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(searchItems, 300);
    });

    document.getElementById('searchInput').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') searchItems();
    });

    async function searchItems() {
        const keyword = document.getElementById('searchInput').value.trim();
        const tbody = document.getElementById('searchResults');

        if (!keyword) {
            tbody.innerHTML = '<tr><td colspan="3" class="text-center text-muted">输入商品名称开始搜索</td></tr>';
            return;
        }

        const data = await api(`/api/user/search?keyword=${encodeURIComponent(keyword)}`, null);

        if (!data.ok || data.items.length === 0) {
            tbody.innerHTML = '<tr><td colspan="3" class="text-center text-muted">未找到相关商品</td></tr>';
            return;
        }

        tbody.innerHTML = data.items.map(item => `
            <tr>
                <td><strong>${item.name}</strong></td>
                <td>¥${item.price}</td>
                <td>
                    <button class="btn btn-success btn-sm w-100" onclick="purchaseItem(${item.id}, '${item.name}')">
                        购买
                    </button>
                </td>
            </tr>
        `).join('');
    }

    async function purchaseItem(itemId, itemName) {
        if (!confirm(`确定要购买「${itemName}」吗？`)) return;

        const result = await api('/api/user/purchase', { item_id: itemId });
        if (result.ok) {
            showToast(`购买成功！「${itemName}」已添加到您的购物车`, 'success');
            searchItems(); // 刷新搜索结果
        } else {
            showToast(result.msg, 'error');
        }
    }
</script>
{% endblock %}
