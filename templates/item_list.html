{% extends "base.html" %}
{% block title %}商品列表{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="fw-bold mb-0"><i class="fas fa-list text-info me-2"></i>商品列表</h4>
    <a href="{{ url_for('user_dashboard') }}" class="btn btn-outline-secondary rounded-pill btn-sm px-3">
        <i class="fas fa-arrow-left me-1"></i>返回
    </a>
</div>
<div class="card shadow-sm border-0" style="border-radius:16px;">
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th class="ps-4">#</th>
                        <th>商品名称</th>
                        <th>价格</th>
                        <th class="pe-4">上架时间</th>
                    </tr>
                </thead>
                <tbody id="itemTableBody">
                    <tr><td colspan="4" class="text-center text-muted py-4">加载中...</td></tr>
                </tbody>
            </table>
        </div>
        <nav id="paginationNav" class="d-none p-3 border-top">
            <ul class="pagination justify-content-center mb-0">
                <li class="page-item" id="prevPage"><a class="page-link" href="#"><i class="fas fa-chevron-left"></i></a></li>
                <li class="page-item disabled"><a class="page-link" id="pageInfo" href="#">1/1</a></li>
                <li class="page-item" id="nextPage"><a class="page-link" href="#"><i class="fas fa-chevron-right"></i></a></li>
            </ul>
        </nav>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
    let currentPage = 1;
    async function loadItems(page) {
        const data = await api(`/api/user/items?page=${page}`, null);
        const tbody = document.getElementById('itemTableBody');
        const nav = document.getElementById('paginationNav');
        if (!data.ok || data.items.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted py-5"><i class="fas fa-box-open fa-2x d-block mb-2 opacity-25"></i>暂无商品</td></tr>';
            nav.classList.add('d-none');
            return;
        }
        tbody.innerHTML = data.items.map((item, i) => `
            <tr>
                <td class="ps-4 text-muted">${(page - 1) * 10 + i + 1}</td>
                <td><strong>${item.name}</strong></td>
                <td><span class="fw-bold text-danger">¥${item.price}</span></td>
                <td class="pe-4 text-muted small">${item.created_at}</td>
            </tr>
        `).join('');
        document.getElementById('pageInfo').textContent = `${page}/${data.total_pages}`;
        document.getElementById('prevPage').classList.toggle('disabled', page <= 1);
        document.getElementById('nextPage').classList.toggle('disabled', page >= data.total_pages);
        nav.classList.remove('d-none');
    }
    document.getElementById('prevPage').addEventListener('click', e => { e.preventDefault(); if (currentPage > 1) loadItems(--currentPage); });
    document.getElementById('nextPage').addEventListener('click', e => { e.preventDefault(); loadItems(++currentPage); });
    loadItems(1);
</script>
{% endblock %}
