{% extends "base.html" %}
{% block title %}用户注册{% endblock %}
{% block content %}
<div class="row justify-content-center min-vh-75 align-items-center">
    <div class="col-md-5">
        <div class="card shadow-sm border-0" style="border-radius:16px;">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <div class="rounded-circle bg-primary bg-opacity-10 d-inline-flex align-items-center justify-content-center mb-2" style="width:56px;height:56px;">
                        <i class="fas fa-user-plus fa-lg text-primary"></i>
                    </div>
                    <h4 class="fw-bold">用户注册</h4>
                </div>
                <form id="registerForm" onsubmit="return false;">
                    <div class="mb-3">
                        <label class="form-label small fw-medium text-muted">用户名</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="fas fa-user text-muted"></i></span>
                            <input type="text" class="form-control border-start-0 ps-0" id="username" maxlength="15" required autocomplete="off" placeholder="不超过15个字符">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-medium text-muted">密码</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="fas fa-lock text-muted"></i></span>
                            <input type="password" class="form-control border-start-0 ps-0" id="password" required placeholder="请输入密码">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-medium text-muted">确认密码</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="fas fa-check-circle text-muted"></i></span>
                            <input type="password" class="form-control border-start-0 ps-0" id="confirmPassword" required placeholder="再次输入密码">
                        </div>
                    </div>
                    <div id="registerError" class="alert alert-danger d-none py-2 small"></div>
                    <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 fw-medium" id="registerBtn">注册</button>
                </form>
                <div class="text-center mt-3">
                    <a href="{{ url_for('index') }}" class="text-decoration-none small">
                        <i class="fas fa-arrow-left me-1"></i>返回首页
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
    document.getElementById('registerForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirmPassword').value;
        const errEl = document.getElementById('registerError');
        const btn = document.getElementById('registerBtn');
        errEl.classList.add('d-none');
        if (password !== confirm) { errEl.textContent = '两次输入的密码不一致'; errEl.classList.remove('d-none'); return; }
        btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>注册中...';
        const result = await api('/api/user/register', { username, password });
        if (result.ok) {
            showToast('注册成功！请登录', 'success');
            setTimeout(() => window.location.href = '/', 1000);
        } else {
            errEl.textContent = result.msg; errEl.classList.remove('d-none');
            btn.disabled = false; btn.textContent = '注册';
        }
    });
</script>
{% endblock %}
