services:
  - type: web
    name: campus-trade
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: campus-trade-db
          property: connectionString

databases:
  - name: campus-trade-db
    plan: free
